<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
    
    <script type="importmap">
    {
      "imports": {
        "env": "./geometry-dash.js"
      }
    }
    </script>
</head>
<body>
    <canvas id="glcanvas"></canvas>
    
    <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
    
    <script type="module">
        import init from './geometry-dash.js';
        
        async function run() {
            // We grab Macroquad's environment functions from the global scope
            // and pass them explicitly into the bindgen import object
            const importObject = {
                env: {
                    ...window.wasm_exports,
                    init_webgl: window.init_webgl,
                    console_log: window.console_log,
                    setup_canvas_size: window.setup_canvas_size,
                    canvas_width: window.canvas_width,
                    canvas_height: window.canvas_height,
                    dpi_scale: window.dpi_scale,
                    run_animation_loop: window.run_animation_loop,
                    fs_load_file: window.fs_load_file
                }
            };
            
            // Initialize the bindgen module with our custom combined import table
            await init('./geometry-dash_bg.wasm', importObject);
        }
        run();
    </script>
</body>
</html>
