<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas"></canvas>
    
    <script>
        // Intercept WebAssembly instantiation to dynamically mock out wasm-bindgen's placeholders
        // This keeps the pipeline native, fast, and safe from missing symbol crashes
        const injectPlaceholders = (importObject) => {
            if (!importObject) importObject = {};
            importObject.__wbindgen_placeholder__ = new Proxy({}, {
                get: (target, prop) => {
                    return (...args) => {
                        console.warn(`wasm-bindgen placeholder mocked call: ${String(prop)}`, args);
                        return 0;
                    };
                }
            });
            return importObject;
        };

        const oldInstantiate = WebAssembly.instantiate;
        WebAssembly.instantiate = function(buffer, importObject) {
            return oldInstantiate(buffer, injectPlaceholders(importObject));
        };

        if (WebAssembly.instantiateStreaming) {
            const oldStreaming = WebAssembly.instantiateStreaming;
            WebAssembly.instantiateStreaming = function(source, importObject) {
                return oldStreaming(source, injectPlaceholders(importObject));
            };
        }
    </script>

    <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
    <script>
        // Boot raw binary directly via macroquad engine loader
        load("./geometry_dash.wasm");
    </script>
</body>
</html>
