<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas"></canvas>
    
    <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
    <script>
        // Inject basic dummy hooks to appease dependencies relying on wasm-bindgen structures
        window.plat_dummy = function() {};
        
        // Boot raw binary directly via macroquad engine loader
        load("./geometry_dash.wasm");
    </script>
</body>
</html>
