<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas"></canvas>
    
    <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
    
    <script src="./geometry-dash.js"></script>
    
    <script>
        // Since we used no-modules, wasm_bindgen is exposed globally!
        // We initialize it, and then instantly hand off execution to Macroquad.
        const { wasm_bindgen } = window;
        
        async function run() {
            // Initialize the rand/getrandom window hooks
            await wasm_bindgen('./geometry-dash_bg.wasm');
            
            // Safely boot the Macroquad game canvas loop
            if (typeof load === 'function') {
                load('./geometry-dash_bg.wasm');
            }
        }
        run();
    </script>
</body>
</html>
