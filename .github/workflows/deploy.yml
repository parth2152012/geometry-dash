name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build WebAssembly Target
        env:
          RUSTFLAGS: "-C link-arg=--allow-undefined"
        run: |
          cargo build --release --target wasm32-unknown-unknown

      - name: Prepare Web Directory
        run: |
          mkdir dist
          
          # Move the raw compiled binary straight into the deployment folder
          cp target/wasm32-unknown-unknown/release/geometry-dash.wasm dist/geometry_dash.wasm
          
          # Copy assets if they exist
          if [ -d "assets" ]; then cp -r assets dist/; fi

      - name: Create index.html
        run: |
          cat << 'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Geometry Dash Clone</title>
              <style>
                  html, body {
                      margin: 0;
                      padding: 0;
                      width: 100%;
                      height: 100%;
                      overflow: hidden;
                      background-color: #000;
                  }
                  canvas {
                      width: 100%;
                      height: 100%;
                      display: block;
                  }
              </style>
          </head>
          <body>
              <canvas id="glcanvas"></canvas>
              
              <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
              <script>
                  // Inject basic dummy hooks to appease dependencies relying on wasm-bindgen structures
                  window.plat_dummy = function() {};
                  
                  // Boot raw binary directly via macroquad engine loader
                  load("./geometry_dash.wasm");
              </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
