name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        run: |
          cargo install wasm-bindgen-cli --version 0.2.122

      - name: Build WebAssembly Target
        env:
          RUSTFLAGS: "-C link-arg=--allow-undefined"
        run: |
          cargo build --release --target wasm32-unknown-unknown

      - name: Prepare Web Directory
        run: |
          mkdir dist
          
          # Using --target no-modules makes it act like a classic global script, 
          # which prevents any "bare specifier" or LinkErrors with macroquad!
          wasm-bindgen target/wasm32-unknown-unknown/release/geometry-dash.wasm --out-dir dist --target no-modules --no-typescript
          
          # Copy assets folder if it exists
          if [ -d "assets" ]; then cp -r assets dist/; fi

      - name: Create index.html
        run: |
          cat << 'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Geometry Dash Clone</title>
              <style>
                  html, body {
                      margin: 0;
                      padding: 0;
                      width: 100%;
                      height: 100%;
                      overflow: hidden;
                      background-color: #000;
                  }
                  canvas {
                      width: 100%;
                      height: 100%;
                      display: block;
                  }
              </style>
          </head>
          <body>
              <canvas id="glcanvas"></canvas>
              
              <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
              
              <script src="./geometry-dash.js"></script>
              
              <script>
                  // Since we used no-modules, wasm_bindgen is exposed globally!
                  // We initialize it, and then instantly hand off execution to Macroquad.
                  const { wasm_bindgen } = window;
                  
                  async function run() {
                      // Initialize the rand/getrandom window hooks
                      await wasm_bindgen('./geometry-dash_bg.wasm');
                      
                      // Safely boot the Macroquad game canvas loop
                      if (typeof load === 'function') {
                          load('./geometry-dash_bg.wasm');
                      }
                  }
                  run();
              </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
