name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build WebAssembly Target
        env:
          RUSTFLAGS: "-C link-arg=--allow-undefined"
        run: |
          cargo build --release --target wasm32-unknown-unknown

      - name: Prepare Web Directory
        run: |
          mkdir dist
          # Copy the raw compiled binary straight into the deployment folder
          cp target/wasm32-unknown-unknown/release/geometry-dash.wasm dist/geometry_dash.wasm
          
          # Copy assets if they exist
          if [ -d "assets" ]; then cp -r assets dist/; fi

      - name: Create index.html
        run: |
          cat << 'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Geometry Dash Clone</title>
              <style>
                  html, body {
                      margin: 0;
                      padding: 0;
                      width: 100%;
                      height: 100%;
                      overflow: hidden;
                      background-color: #000;
                  }
                  canvas {
                      width: 100%;
                      height: 100%;
                      display: block;
                  }
              </style>
          </head>
          <body>
              <canvas id="glcanvas"></canvas>
              
              <script>
                  // Deep containment patch to shield macroquad from rogue wasm-bindgen dependencies
                  const patchImports = (importObject) => {
                      if (!importObject) importObject = {};
                      
                      // Infinite dummy proxy function to catch unexpected function calls or property accesses
                      const createDummy = () => {
                          const f = function() { return 0; };
                          return new Proxy(f, {
                              get: () => createDummy(),
                              construct: () => createDummy()
                          });
                      };

                      // Resolve missing root-level structural tables and transforms
                      const rootPlaceholders = [
                          '__wbindgen_placeholder__',
                          '__wbindgen_externref_xform__',
                          '__wbindgen_externref_table__'
                      ];
                      
                      rootPlaceholders.forEach(key => {
                          if (!importObject[key]) {
                              importObject[key] = new Proxy({}, {
                                  get: () => createDummy()
                              });
                          }
                      });

                      // Intercept the environment object to satisfy missing crypto, node, or execution functions
                      if (importObject.env) {
                          importObject.env = new Proxy(importObject.env, {
                              get: (target, prop) => {
                                  if (prop in target) return target[prop];
                                  return createDummy();
                              }
                          });
                      }
                      return importObject;
                  };

                  // Globally override the WebAssembly instantiation handlers
                  const oldInstantiate = WebAssembly.instantiate;
                  WebAssembly.instantiate = function(buffer, importObject) {
                      return oldInstantiate(buffer, patchImports(importObject));
                  };

                  if (WebAssembly.instantiateStreaming) {
                      const oldStreaming = WebAssembly.instantiateStreaming;
                      WebAssembly.instantiateStreaming = function(source, importObject) {
                          return oldStreaming(source, patchImports(importObject));
                      };
                  }
              </script>

              <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
              <script>
                  // Boot raw binary directly via macroquad engine loader
                  load("./geometry_dash.wasm");
              </script>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
